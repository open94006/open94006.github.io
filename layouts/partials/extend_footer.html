<script>
  document.addEventListener('DOMContentLoaded', function () {
    const toc = document.querySelector('.post-single > .toc');
    if (!toc) {
      return;
    }

    const body = document.body;
    const mediaQuery = window.matchMedia('(max-width: 768px)');
    let scrollTimer;

    let toggleButton = document.getElementById('toc-fab');
    if (!toggleButton) {
      toggleButton = document.createElement('button');
      toggleButton.type = 'button';
      toggleButton.id = 'toc-fab';
      toggleButton.className = 'toc-fab';
      toggleButton.setAttribute('aria-label', '切換文章目錄');
      toggleButton.setAttribute('title', '文章目錄');
      toggleButton.setAttribute('aria-expanded', 'false');
      toggleButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 3.5h10A2.5 2.5 0 0 1 19.5 6v12A2.5 2.5 0 0 1 17 20.5H7A2.5 2.5 0 0 1 4.5 18V6A2.5 2.5 0 0 1 7 3.5Z"></path><path d="M8.5 8h1"></path><path d="M11 8h5"></path><path d="M8.5 12h1"></path><path d="M11 12h5"></path><path d="M8.5 16h1"></path><path d="M11 16h5"></path></svg>';
      document.body.appendChild(toggleButton);
    }

    if (!toc.id) {
      toc.id = 'post-toc-panel';
    }

    body.classList.add('floating-toc-ready');
    toggleButton.setAttribute('aria-controls', toc.id);

    const closePanel = function () {
      toc.classList.remove('mobile-open');
      toggleButton.classList.remove('is-active');
      toggleButton.setAttribute('aria-expanded', 'false');
    };

    const openPanel = function () {
      toc.classList.add('mobile-open');
      toggleButton.classList.add('is-active');
      toggleButton.setAttribute('aria-expanded', 'true');
    };

    const showDesktopScrollbar = function () {
      if (mediaQuery.matches) {
        return;
      }

      toc.classList.add('is-scrolling');
      window.clearTimeout(scrollTimer);
      scrollTimer = window.setTimeout(function () {
        toc.classList.remove('is-scrolling');
      }, 700);
    };

    const syncViewport = function (event) {
      if (!event.matches) {
        closePanel();
      }
    };

    toggleButton.addEventListener('click', function (event) {
      event.preventDefault();
      event.stopPropagation();

      if (!mediaQuery.matches) {
        return;
      }

      if (toc.classList.contains('mobile-open')) {
        closePanel();
      } else {
        openPanel();
      }
    });

    toc.addEventListener('click', function (event) {
      if (mediaQuery.matches) {
        event.stopPropagation();
      }
    });

    document.addEventListener('click', function () {
      if (mediaQuery.matches && toc.classList.contains('mobile-open')) {
        closePanel();
      }
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        closePanel();
      }
    });

    toc.querySelectorAll('a[href^="#"]').forEach(function (link) {
      link.addEventListener('click', function () {
        if (mediaQuery.matches) {
          closePanel();
        }
      });
    });

    toc.addEventListener('scroll', showDesktopScrollbar, { passive: true });

    if (typeof mediaQuery.addEventListener === 'function') {
      mediaQuery.addEventListener('change', syncViewport);
    } else {
      mediaQuery.addListener(syncViewport);
    }
  });
</script>
